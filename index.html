  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      padding: 40px 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: #a0a0a0;
      font-size: 1.1rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: transform 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(102, 126, 234, 0.5);
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .stat-label {
      color: #a0a0a0;
      margin-top: 8px;
      font-size: 0.9rem;
    }

    .controls {
      display: flex;
      gap: 16px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .search-box, .filter-select {
      flex: 1;
      min-width: 200px;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 1rem;
    }

    .search-box:focus, .filter-select:focus {
      outline: none;
      border-color: #667eea;
    }

    .filter-btn {
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #e0e0e0;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .filter-btn:hover {
      background: rgba(102, 126, 234, 0.2);
      border-color: #667eea;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-color: transparent;
      color: white;
    }

    .papers-grid {
      display: grid;
      gap: 20px;
    }

    .paper-card {
      background: rgba(255, 255, 255, 0.05);
      padding: 24px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.3s;
    }

    .paper-card:hover {
      border-color: rgba(102, 126, 234, 0.5);
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.2);
    }

    .paper-title {
      font-size: 1.2rem;
      margin-bottom: 12px;
      color: #f0f0f0;
      line-height: 1.4;
    }

    .paper-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .meta-badge {
      padding: 4px 12px;
      background: rgba(102, 126, 234, 0.2);
      border-radius: 6px;
      font-size: 0.85rem;
      color: #b8c5ff;
    }

    .meta-badge.dataset {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
    }

    .meta-badge.method {
      background: rgba(251, 146, 60, 0.2);
      color: #fdba74;
    }

    .meta-badge.type {
      background: rgba(168, 85, 247, 0.2);
      color: #c084fc;
    }

    .meta-badge.tag {
      background: rgba(34, 211, 238, 0.2);
      color: #a5f3fc;
    }

    .paper-links {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .link-btn {
      padding: 8px 16px;
      background: rgba(102, 126, 234, 0.2);
      border: 1px solid rgba(102, 126, 234, 0.3);
      border-radius: 6px;
      color: #b8c5ff;
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s;
      display: inline-block;
    }

    .link-btn:hover {
      background: rgba(102, 126, 234, 0.4);
      transform: translateY(-2px);
    }

    .link-btn.github {
      background: rgba(34, 211, 238, 0.2);
      border-color: rgba(34, 211, 238, 0.3);
      color: #a5f3fc;
    }

    .link-btn.github:hover {
      background: rgba(34, 211, 238, 0.4);
    }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: #a0a0a0;
      font-size: 1.1rem;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #a0a0a0;
      font-size: 1.2rem;
    }
  </style>
</head>

      [
        "EMNLP",

  },
  "metadata": {
    "source": "https://github.com/huhusmang/Awesome-LLMs-for-Vulnerability-Detection",
    "parsed_at": "2026-04-29",
    "total_papers": 87
  }
};
    
    const papers = DATA.papers;
    let filteredPapers = papers;
    
    // State
    let filters = {
      search: '',
      year: 'all',
      code: 'all',
      method: 'all',
      type: 'all'
    };

    // Extract unique values
    const years = ['all', ...Array.from(new Set(papers.map(p => p.year).filter(y => typeof y === 'number'))).sort().reverse()];
    const methods = Array.from(new Set(papers.flatMap(p => p.methods || []))).sort();
    const types = ['all', ...Array.from(new Set(papers.map(p => p.paper_type).filter(Boolean))).sort()];

    // Render stats
    function renderStats() {
      const withCode = papers.filter(p => p.has_code).length;
      const html = `
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-value">${papers.length}</div>
            <div class="stat-label">Total Papers</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${withCode}</div>
            <div class="stat-label">With Code</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${Math.round(withCode/papers.length*100)}%</div>
            <div class="stat-label">Reproducibility Rate</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${papers.filter(p => (p.methods || []).includes('LLM-based')).length}</div>
            <div class="stat-label">LLM-based Papers</div>
          </div>
        </div>
      `;
      document.getElementById('stats').innerHTML = html;
    }

    // Render controls
    function renderControls() {
      const html = `
        <div class="controls">
          <input 
            type="text" 
            class="search-box" 
            id="search"
            placeholder="Search by title, venue, method, dataset..."
            value="${filters.search}"
          />
          <select class="filter-select" id="year-filter">
            ${years.map(y => `<option value="${y}" ${filters.year === y ? 'selected' : ''}>${y === 'all' ? 'All Years' : y}</option>`).join('')}
          </select>
          <select class="filter-select" id="method-filter">
            <option value="all">All Methods</option>
            ${methods.map(m => `<option value="${m}" ${filters.method === m ? 'selected' : ''}>${m}</option>`).join('')}
          </select>
          <select class="filter-select" id="type-filter">
            ${types.map(t => `<option value="${t}" ${filters.type === t ? 'selected' : ''}>${t === 'all' ? 'All Types' : t}</option>`).join('')}
          </select>
          <button class="filter-btn ${filters.code === 'all' ? 'active' : ''}" onclick="setCodeFilter('all')">All</button>
          <button class="filter-btn ${filters.code === 'with-code' ? 'active' : ''}" onclick="setCodeFilter('with-code')">With Code</button>
        </div>
      `;
      document.getElementById('controls').innerHTML = html;
      
      // Add event listeners
      document.getElementById('search').addEventListener('input', (e) => {
        filters.search = e.target.value;
        applyFilters();
      });
      document.getElementById('year-filter').addEventListener('change', (e) => {
        filters.year = e.target.value;
        applyFilters();
      });
      document.getElementById('method-filter').addEventListener('change', (e) => {
        filters.method = e.target.value;
        applyFilters();
      });
      document.getElementById('type-filter').addEventListener('change', (e) => {
        filters.type = e.target.value;
        applyFilters();
      });
    }

    // Filter papers
    function applyFilters() {
      filteredPapers = papers;

      // Search
      if (filters.search) {
        const search = filters.search.toLowerCase();
        filteredPapers = filteredPapers.filter(p =>
          p.title.toLowerCase().includes(search) ||
          p.venue.toLowerCase().includes(search) ||
          (p.methods || []).some(m => m.toLowerCase().includes(search)) ||
          (p.datasets || []).some(d => d.toLowerCase().includes(search))
        );
      }

      // Year
      if (filters.year !== 'all') {
        filteredPapers = filteredPapers.filter(p => p.year === parseInt(filters.year));
      }

      // Method
      if (filters.method !== 'all') {
        filteredPapers = filteredPapers.filter(p => (p.methods || []).includes(filters.method));
      }

      // Type
      if (filters.type !== 'all') {
        filteredPapers = filteredPapers.filter(p => p.paper_type === filters.type);
      }

      // Code
      if (filters.code === 'with-code') {
        filteredPapers = filteredPapers.filter(p => p.has_code);
      }

      renderPapers();
      renderControls();
    }

    // Set code filter
    function setCodeFilter(value) {
      filters.code = value;
      applyFilters();
    }

    // Render papers
    function renderPapers() {
      if (filteredPapers.length === 0) {
        document.getElementById('papers').innerHTML = '<div class="no-results">No papers found matching your filters</div>';
        return;
      }

      const html = `
        <div class="papers-grid">
          ${filteredPapers.map(p => `
            <div class="paper-card">
              <h3 class="paper-title">${p.title}</h3>
              <div class="paper-meta">
                <span class="meta-badge">${p.venue}</span>
                <span class="meta-badge">${p.year}</span>
                ${p.paper_type ? `<span class="meta-badge type">${p.paper_type}</span>` : ''}
                ${p.has_code ? '<span class="meta-badge">✓ Code</span>' : ''}
              </div>
              ${(p.methods && p.methods.length > 0) ? `
                <div class="paper-meta">
                  ${p.methods.map(m => `<span class="meta-badge method">${m}</span>`).join('')}
                </div>
              ` : ''}
              ${(p.datasets && p.datasets.length > 0) ? `
                <div class="paper-meta">
                  ${p.datasets.map(d => `<span class="meta-badge dataset">📊 ${d}</span>`).join('')}
                </div>
              ` : ''}
              ${(p.tags && p.tags.length > 0) ? `
                <div class="paper-meta">
                  ${p.tags.map(t => `<span class="meta-badge tag">${t}</span>`).join('')}
                </div>
              ` : ''}
              <div class="paper-links">
                ${p.paper_url ? `<a href="${p.paper_url}" target="_blank" class="link-btn">📄 Paper</a>` : ''}
                ${p.github_url ? `<a href="${p.github_url}" target="_blank" class="link-btn github">💻 Code</a>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
      document.getElementById('papers').innerHTML = html;
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      renderStats();
      renderControls();
      renderPapers();
      console.log('VulnResearch Explorer loaded successfully!');
    });
  </script>
